name: 🔒 Security Audit

on:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".gitleaks.toml"
  workflow_dispatch:
    inputs:
      build_flavor:
        description: Build flavor for the manual portable/commercial package
        required: false
        default: commercial
        type: choice
        options:
          - commercial
          - portable

jobs:
  cargo-audit:
    name: 📋 Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: |
            packages/core
            packages/collectionloom/src-tauri
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked 2>/dev/null || true
      - name: Audit all Cargo projects
        run: |
          for dir in packages/core packages/collectionloom/src-tauri; do
            if [ -f "$dir/Cargo.toml" ]; then
              echo "=== Auditing $dir ==="
              (cd "$dir" && cargo audit)
            fi
          done

  sbom:
    name: 📦 SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked 2>/dev/null || true
      - name: Generate SBOM for each package
        continue-on-error: true
        run: |
          for dir in packages/core packages/collectionloom/src-tauri; do
            if [ -f "$dir/Cargo.toml" ]; then
              echo "=== SBOM for $dir ==="
              cd $dir && cargo cyclonedx 2>&1 || true
              cd - >/dev/null
            fi
          done
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: "**/*.cdx.xml"
          retention-days: 30

  package:
    name: 📦 Commercial Build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libpcap-dev

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: packages/collectionloom/src-tauri

      - name: Install npm deps
        run: npm ci

      - name: Build commercial package
        working-directory: packages/collectionloom
        run: npm run build:commercial
        env:
          COLLECTIONLOOM_BUILD_FLAVOR: ${{ inputs.build_flavor }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: collectionloom-commercial-${{ inputs.build_flavor }}
          path: |
            packages/collectionloom/src-tauri/target/release/bundle/**
