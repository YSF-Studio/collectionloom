name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gitleaks:
    name: 🔍 Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GL_VERSION=8.24.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" | tar -xz -C /tmp
          sudo install -m 755 /tmp/gitleaks /usr/local/bin/gitleaks
      - name: Secret scan
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose

  core-test:
    name: 🧩 ysf-core Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/core
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: packages/core
      - run: cargo test

  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        working-directory: packages/collectionloom
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libpcap-dev

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: packages/collectionloom/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Download bundled tools
        working-directory: packages/collectionloom
        run: npm run download-tools
        env:
          COLLECTIONLOOM_BUILD_FLAVOR: source

      - name: Build Frontend
        working-directory: packages/collectionloom
        run: npm run build

      - name: Build Rust
        working-directory: packages/collectionloom
        run: cargo build --manifest-path src-tauri/Cargo.toml

      - name: Test Rust
        working-directory: packages/collectionloom
        run: cargo test --manifest-path src-tauri/Cargo.toml

  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install gitleaks
        run: |
          GL_VERSION=8.24.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" | tar -xz -C /tmp
          sudo install -m 755 /tmp/gitleaks /usr/local/bin/gitleaks
      - name: Secret scan
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose

      - name: Cargo Audit (core)
        run: |
          cargo install cargo-audit --locked 2>/dev/null
          if [ -f "$GITHUB_WORKSPACE/packages/core/Cargo.toml" ]; then
            (cd "$GITHUB_WORKSPACE/packages/core" && cargo audit)
          fi
          if [ -f "$GITHUB_WORKSPACE/packages/collectionloom/src-tauri/Cargo.toml" ]; then
            (cd "$GITHUB_WORKSPACE/packages/collectionloom/src-tauri" && cargo audit)
          fi

  e2e-ui:
    name: E2E UI (Playwright fixture)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Download bundled tools
        working-directory: packages/collectionloom
        run: npm run download-tools
        env:
          COLLECTIONLOOM_BUILD_FLAVOR: source

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: IPC audit (invoke vs generate_handler)
        run: npm run audit:ipc

      - name: GUI E2E (fixture preview)
        run: npm run test:e2e
        env:
          SKIP_TOOL_DOWNLOAD: "1"

  e2e-webdriver:
    name: E2E WebDriver (Tauri binary)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libssl-dev libpcap-dev webkit2gtk-driver xvfb

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: packages/collectionloom/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Download bundled tools
        working-directory: packages/collectionloom
        run: npm run download-tools
        env:
          COLLECTIONLOOM_BUILD_FLAVOR: source

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked --force

      - name: IPC audit
        run: npm run audit:ipc

      - name: Generate IPC TypeScript bindings
        run: npm run generate:types

      - name: Tauri WebDriver smoke (xvfb)
        run: xvfb-run --auto-servernum -- npm run test:e2e:tauri
        env:
          SKIP_TOOL_DOWNLOAD: "1"
