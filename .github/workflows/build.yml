name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect:
    name: 🧭 Detect App
    runs-on: ubuntu-latest
    outputs:
      app_dir: ${{ steps.detect.outputs.app_dir }}
      cargo_ws: ${{ steps.detect.outputs.cargo_ws }}
      npm_lock: ${{ steps.detect.outputs.npm_lock }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          # Infer app name from repository name (e.g. YSF-Studio/collectionloom → collectionloom)
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "Repository: $GITHUB_REPOSITORY → app: $REPO_NAME"

          # Check standalone structure (root level) — highest priority
          if [ -f "src-tauri/Cargo.toml" ]; then
            echo "Standalone mode: root"
            echo "app_dir=." >> $GITHUB_OUTPUT
            echo "cargo_ws=src-tauri" >> $GITHUB_OUTPUT
            if [ -f "package-lock.json" ]; then
              echo "npm_lock=package-lock.json" >> $GITHUB_OUTPUT
            else
              echo "npm_lock=." >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          # Check monorepo structure (packages/<app>/)
          if [ -d "packages/$REPO_NAME" ] && [ -f "packages/$REPO_NAME/src-tauri/Cargo.toml" ]; then
            echo "Monorepo mode: packages/$REPO_NAME"
            echo "app_dir=packages/$REPO_NAME" >> $GITHUB_OUTPUT
            echo "cargo_ws=packages/$REPO_NAME/src-tauri" >> $GITHUB_OUTPUT
            # npm workspace: root has the lock file
            if [ -f "packages/$REPO_NAME/package-lock.json" ]; then
              echo "npm_lock=packages/$REPO_NAME/package-lock.json" >> $GITHUB_OUTPUT
            elif [ -f "package-lock.json" ]; then
              echo "npm_lock=package-lock.json" >> $GITHUB_OUTPUT
            else
              echo "npm_lock=." >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          # Fallback: check any packages/<app>/
          for dir in packages/collectionloom; do
            if [ -f "$dir/package.json" ]; then
              echo "Fallback detected: $dir"
              echo "app_dir=$dir" >> $GITHUB_OUTPUT
              echo "cargo_ws=$dir/src-tauri" >> $GITHUB_OUTPUT
              if [ -f "$dir/package-lock.json" ]; then
                echo "npm_lock=$dir/package-lock.json" >> $GITHUB_OUTPUT
              elif [ -f "package-lock.json" ]; then
                echo "npm_lock=package-lock.json" >> $GITHUB_OUTPUT
              else
                echo "npm_lock=." >> $GITHUB_OUTPUT
              fi
              exit 0
            fi
          done

          echo "app_dir=." >> $GITHUB_OUTPUT
          echo "cargo_ws=." >> $GITHUB_OUTPUT
          echo "npm_lock=." >> $GITHUB_OUTPUT
          echo "Warning: No app structure found, using root"

  build:
    name: Build (${{ matrix.platform }})
    needs: detect
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        working-directory: ${{ needs.detect.outputs.app_dir }}
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libpcap-dev

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: ${{ needs.detect.outputs.cargo_ws }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ needs.detect.outputs.npm_lock }}

      - name: Install npm deps
        run: npm ci

      - name: Build Frontend
        working-directory: ${{ needs.detect.outputs.app_dir }}
        run: npm run build

      - name: Build Rust
        working-directory: ${{ needs.detect.outputs.app_dir }}
        run: cargo build --manifest-path src-tauri/Cargo.toml

      - name: Test Rust
        working-directory: ${{ needs.detect.outputs.app_dir }}
        run: cargo test --manifest-path src-tauri/Cargo.toml

  security:
    name: 🔒 Security Audit
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install gitleaks
        run: |
          GL_VERSION=8.24.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" | tar -xz -C /tmp
          sudo install -m 755 /tmp/gitleaks /usr/local/bin/gitleaks
      - name: Secret scan
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose

      - name: Cargo Audit (core)
        run: |
          cargo install cargo-audit --locked 2>/dev/null
          APPDIR="${{ needs.detect.outputs.app_dir }}"
          if [ -d "packages/core" ]; then
            cd packages/core && cargo audit
          fi
          if [ -f "$APPDIR/src-tauri/Cargo.toml" ]; then
            cd "$APPDIR/src-tauri" && cargo audit
          fi

  e2e-ui:
    name: E2E UI (Playwright fixture)
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ needs.detect.outputs.npm_lock }}

      - name: Install npm deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: IPC audit (invoke vs generate_handler)
        run: npm run audit:ipc

      - name: GUI E2E (fixture preview)
        run: npm run test:e2e
        env:
          SKIP_TOOL_DOWNLOAD: "1"

  e2e-webdriver:
    name: E2E WebDriver (Tauri binary)
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        working-directory: ${{ needs.detect.outputs.app_dir }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libssl-dev libpcap-dev webkit2gtk-driver xvfb

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: ${{ needs.detect.outputs.cargo_ws }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ needs.detect.outputs.npm_lock }}

      - name: Install npm deps
        run: npm ci

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked --force

      - name: IPC audit
        run: npm run audit:ipc

      - name: Generate IPC TypeScript bindings
        run: npm run generate:types

      - name: Tauri WebDriver smoke (xvfb)
        run: xvfb-run --auto-servernum -- npm run test:e2e:tauri
        env:
          SKIP_TOOL_DOWNLOAD: "1"
