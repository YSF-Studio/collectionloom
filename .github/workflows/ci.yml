name: CI/CD — Build, Test & Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  gitleaks:
    name: 🔍 Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  core-test:
    name: 🧩 ysf-core Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/core
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: packages/core
      - run: cargo test

  ziploom:
    name: 📦 ZipLoom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install npm deps
        run: npm ci
      - name: Build Frontend
        working-directory: packages/ziploom
        run: npm run build
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: packages/ziploom/src-tauri
      - name: Build Rust
        working-directory: packages/ziploom
        run: cargo build --manifest-path src-tauri/Cargo.toml
      - name: Test Rust
        working-directory: packages/ziploom
        run: cargo test --manifest-path src-tauri/Cargo.toml

  collectionloom:
    name: 📀 CollectionLoom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libpcap-dev
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install npm deps
        run: npm ci
      - name: Build Frontend
        working-directory: packages/collectionloom
        run: npm run build
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: packages/collectionloom/src-tauri
      - name: Build Rust
        working-directory: packages/collectionloom
        run: cargo build --manifest-path src-tauri/Cargo.toml
      - name: Test Rust
        working-directory: packages/collectionloom
        run: cargo test --manifest-path src-tauri/Cargo.toml

  analysisloom:
    name: 🔬 AnalysisLoom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libpcap-dev
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install npm deps
        run: npm ci
      - name: Build Frontend
        working-directory: packages/analysisloom
        run: npm run build
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: packages/analysisloom/src-tauri
      - name: Build Rust
        working-directory: packages/analysisloom
        run: cargo build --manifest-path src-tauri/Cargo.toml
      - name: Test Rust
        working-directory: packages/analysisloom
        run: cargo test --manifest-path src-tauri/Cargo.toml
