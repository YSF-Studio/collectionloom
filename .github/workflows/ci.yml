name: CI/CD — Build, Test & Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  gitleaks:
    name: 🔍 Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  core-test:
    name: 🧩 ysf-core Tests
    if: hashFiles('packages/core/Cargo.toml') != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/core
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - run: cargo test

  ziploom:
    name: 📦 ZipLoom
    if: hashFiles('packages/ziploom/package.json') != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ziploom
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev
        if: runner.os == 'Linux'
      - run: cargo build --manifest-path src-tauri/Cargo.toml
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: packages/ziploom/package-lock.json
      - run: npm ci
      - run: npm run build

  collectionloom:
    name: 📀 CollectionLoom
    if: hashFiles('packages/collectionloom/package.json') != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/collectionloom
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libpcap-dev
        if: runner.os == 'Linux'
      - run: cargo build --manifest-path src-tauri/Cargo.toml
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: packages/collectionloom/package-lock.json
      - run: npm ci
      - run: npm run build

  analysisloom:
    name: 🔬 AnalysisLoom
    if: hashFiles('packages/analysisloom/package.json') != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/analysisloom
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libpcap-dev
        if: runner.os == 'Linux'
      - run: cargo build --manifest-path src-tauri/Cargo.toml
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: packages/analysisloom/package-lock.json
      - run: npm ci
      - run: npm run build
